<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Visitare — teste da porta</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    font-family: system-ui, sans-serif;
  }

  .hint {
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #aaa;
  }

  .door-icon {
    display: block;
    overflow: visible;
    cursor: pointer;
  }

  /* quadrado de trás: frame estático.
     stroke NORMAL (escala com o viewBox) + paint-order stroke fill
     (a fill cobre a metade interna do stroke → branco só por fora,
     mantendo o preto cheio). */
  .door-back {
    paint-order: stroke fill;
  }

  /* porta: a animação NÃO é mais transform (que distorce o stroke).
     Em vez disso, os PONTOS do polígono são interpolados via JS de
     quadrado (fechado) → paralelogramo (aberto). Como não há transform,
     o stroke é recalculado a cada quadro sobre a geometria atual:
     fica SEMPRE uniforme em todas as bordas E escala com o viewBox. */
  .door-front {
    paint-order: stroke fill;
  }
</style>
</head>
<body>

  <p class="hint">hover → fecha &nbsp;|&nbsp; sai → abre</p>

  <svg xmlns="http://www.w3.org/2000/svg"
       viewBox="-13 -13 126 126"
       class="door-icon"
       width="220" height="220">

    <!-- frame: quadrado estático, atrás — mint (#83C5BE, secondary) -->
    <rect class="door-back"
          x="0" y="0" width="100" height="100"
          fill="#83C5BE" stroke="#ffffff" stroke-width="26"/>

    <!-- porta: polígono cujos pontos são animados (começa aberto).
         Pontos da referência -2 (normalizados ao quadrado 0–100):
         fold em 33.6 (face mais fina) + mais shear, dobradiça em x=100.
         teal escuro (#006D77, primary) — painel que se move. -->
    <polygon class="door-front"
             fill="#006D77" stroke="#ffffff" stroke-width="26"
             stroke-linejoin="miter"
             points="33.6,41.58 100,3.29 100,103.59 33.6,141.97"/>

  </svg>

  <script>
    (function () {
      const icon = document.querySelector('.door-icon');
      const door = icon.querySelector('.door-front');

      // Estados-alvo. val=0 → aberto, val=1 → fechado.
      // OPEN = pontos da referência -2 (normalizados 0–100).
      const OPEN   = [[33.6, 41.58], [100, 3.29], [100, 103.59], [33.6, 141.97]];
      const CLOSED = [[0, 0], [100, 0], [100, 100], [0, 100]];

      const DURATION = 300; // ms — abrir/fechar rápido

      // easeInOutBack: passa abaixo de 0 no início (antecipação: recua
      // antes de ir) e acima de 1 no fim (overshoot: passa do ponto e
      // assenta). Como interpolamos os pontos LINEARMENTE com esse valor,
      // val<0 e val>1 EXTRAPOLAM as coordenadas → é o bounce em si.
      function easeInOutBack(x) {
        const c1 = 1.70158;
        const c2 = c1 * 1.525;
        return x < 0.5
          ? (Math.pow(2 * x, 2) * ((c2 + 1) * 2 * x - c2)) / 2
          : (Math.pow(2 * x - 2, 2) * ((c2 + 1) * (2 * x - 2) + c2) + 2) / 2;
      }

      function setPoints(val) {
        const pts = OPEN.map(([ox, oy], i) => {
          const [cx, cy] = CLOSED[i];
          return (ox + (cx - ox) * val) + ',' + (oy + (cy - oy) * val);
        });
        door.setAttribute('points', pts.join(' '));
      }

      let raf = null, startTs = null, fromVal = 0, toVal = 0, curVal = 0;

      function animateTo(target) {
        fromVal = curVal;
        toVal = target;
        startTs = null;
        if (raf) cancelAnimationFrame(raf);
        const step = (ts) => {
          if (startTs === null) startTs = ts;
          const p = Math.min((ts - startTs) / DURATION, 1);
          curVal = fromVal + (toVal - fromVal) * easeInOutBack(p);
          setPoints(curVal);
          if (p < 1) {
            raf = requestAnimationFrame(step);
          } else {
            curVal = toVal;
            setPoints(curVal);
          }
        };
        raf = requestAnimationFrame(step);
      }

      icon.addEventListener('mouseenter', () => animateTo(1)); // fecha
      icon.addEventListener('mouseleave', () => animateTo(0)); // abre

      setPoints(0); // começa aberto
    })();
  </script>

</body>
</html>
