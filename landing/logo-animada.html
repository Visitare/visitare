  <p class="hint">hover no símbolo → fecha &nbsp;|&nbsp; sai → abre</p>

    </g>

  </svg>

  <script>
    (function () {
      const symbol = document.querySelector('.symbol');
      const door   = symbol.querySelector('.door-front');

      // Coordenadas extraídas do visitare-logo.svg (fonte de verdade).
      // OPEN  = porta aberta (estado da marca)
      // CLOSED = porta fechada contra o frame (dobradiça no lado direito, x=100.33)
      const OPEN   = [[100.33, 103.94], [100.33, 3.28], [33.73, 41.74], [33.73, 142.39]];
      const CLOSED = [[100.33, 100.33], [100.33, 0],    [0,     0],     [0,     100.33]];

      const DURATION = 300;

      function easeInOutBack(x) {
        const c1 = 1.70158;
        const c2 = c1 * 1.525;
        return x < 0.5
          ? (Math.pow(2 * x, 2) * ((c2 + 1) * 2 * x - c2)) / 2
          : (Math.pow(2 * x - 2, 2) * ((c2 + 1) * (2 * x - 2) + c2) + 2) / 2;
      }

      function setPoints(val) {
        const pts = OPEN.map(([ox, oy], i) => {
          const [cx, cy] = CLOSED[i];
          return (ox + (cx - ox) * val) + ',' + (oy + (cy - oy) * val);
        });
        door.setAttribute('points', pts.join(' '));
      }

      let raf = null, startTs = null, fromVal = 0, toVal = 0, curVal = 0;

      function animateTo(target) {
        fromVal = curVal;
        toVal   = target;
        startTs = null;
        if (raf) cancelAnimationFrame(raf);
        const step = (ts) => {
          if (startTs === null) startTs = ts;
          const p = Math.min((ts - startTs) / DURATION, 1);
          curVal = fromVal + (toVal - fromVal) * easeInOutBack(p);
          setPoints(curVal);
          if (p < 1) {
            raf = requestAnimationFrame(step);
          } else {
            curVal = toVal;
            setPoints(curVal);
          }
        };
        raf = requestAnimationFrame(step);
      }

      symbol.addEventListener('mouseenter', () => animateTo(1)); // fecha
      symbol.addEventListener('mouseleave', () => animateTo(0)); // abre

      setPoints(0); // começa no estado da marca: porta aberta
    })();
  </script>

</body>
</html>
